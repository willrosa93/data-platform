x-airflow-common:
  &airflow-common
  image: apache/airflow:2.9.2
  environment:
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_db:5432/airflow
    AIRFLOW__CORE__EXECUTOR: SequentialExecutor
    AIRFLOW__WEBSERVER__SECRET_KEY: "chave_super_secreta_123"
  volumes:
    - ./dags:/opt/airflow/dags
  extra_hosts:
    - "host.docker.internal:host-gateway"
  networks:
    - projeto_conta_bancaria_default

services:
  airflow_db:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      retries: 5
    networks:
      - projeto_conta_bancaria_default

  airflow-init:
    <<: *airflow-common
    depends_on:
      airflow_db:
        condition: service_healthy
    networks:  # <- garante que herda a network
      - projeto_conta_bancaria_default
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create \
      --username admin \
      --firstname Willian \
      --lastname Rosa \
      --role Admin \
      --email admin@admin.com \
      --password admin || true
      "

  airflow-webserver:
    <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    command: airflow webserver
    restart: always
    networks:
      - projeto_conta_bancaria_default

  airflow-scheduler:
    <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: airflow scheduler
    restart: always
    networks:
      - projeto_conta_bancaria_default

networks:
  projeto_conta_bancaria_default:
    external: true