version: 2

models:
  - name: stg_orders
    description: "Staging layer: tipos normalizados, status em lowercase"
    columns:
      - name: order_id
        description: Chave primária do pedido
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - not_null

      - name: amount
        tests:
          - not_null

      - name: status
        description: Status normalizado em lowercase
        tests:
          - accepted_values:
              values: ['paid', 'pending', 'refund']