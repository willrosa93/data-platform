version: 2

models:
  - name: stg_orders
    description: Orders vindas da tabela raw ecommerce.orders
    columns:
      - name: order_id
        description: PK da order
        tests:
          - unique
          - not_null

      - name: amount
        tests:
          - not_null

      - name: created_at
        tests:
          - not_null
