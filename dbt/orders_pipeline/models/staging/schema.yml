version: 2

sources:
  - name: breweries_raw
    database: "{{ env_var('GOOGLE_CLOUD_PROJECT') }}"
    schema: breweries_raw
    tables:
      - name: breweries

models:
  - name: stg_breweries
    description: "Cervejarias limpas e padronizadas"
    columns:
      - name: id
        description: "ID único da cervejaria"
        data_tests:
          - not_null
          - unique
      - name: brewery_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['micro', 'nano', 'regional', 'brewpub', 'large',
                         'planning', 'bar', 'contract', 'proprietor', 'taproom', 'closed']
      - name: brewery_name
        data_tests:
          - not_null

  - name: stg_orders
    description: "Staging layer: tipos normalizados, status em lowercase"
    columns:
      - name: order_id
        description: Chave primária do pedido
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - not_null

      - name: amount
        tests:
          - not_null

      - name: status
        description: Status normalizado em lowercase
        tests:
          - accepted_values:
              arguments:
                values: ['paid', 'pending', 'refund']